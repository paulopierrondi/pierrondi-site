<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="pierrondi.dev logo">
  <defs>
    <radialGradient id="bg" cx="68%" cy="22%" r="82%">
      <stop offset="0%" stop-color="#14363f"/>
      <stop offset="38%" stop-color="#071112"/>
      <stop offset="100%" stop-color="#020303"/>
    </radialGradient>
    <radialGradient id="limeGlow" cx="66%" cy="31%" r="48%">
      <stop offset="0%" stop-color="#c8ff2e" stop-opacity="0.72"/>
      <stop offset="52%" stop-color="#c8ff2e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8ff2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="175" y1="187" x2="835" y2="812">
      <stop offset="0%" stop-color="#7ee7ff" stop-opacity="0.72"/>
      <stop offset="45%" stop-color="#c8ff2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f7f5ee" stop-opacity="0.56"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 H 0 V 64" fill="none" stroke="#f7f5ee" stroke-opacity="0.07" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" rx="184" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="184" fill="url(#grid)" opacity="0.55"/>
  <circle cx="642" cy="310" r="350" fill="url(#limeGlow)"/>

  <g transform="translate(512 512)">
    <circle r="346" fill="none" stroke="#f7f5ee" stroke-opacity="0.13" stroke-width="7"/>
    <ellipse rx="372" ry="142" fill="none" stroke="url(#ring)" stroke-width="16" opacity="0.88" transform="rotate(-18)" filter="url(#softGlow)"/>
    <ellipse rx="284" ry="104" fill="none" stroke="#7ee7ff" stroke-width="6" opacity="0.42" transform="rotate(23)"/>
    <circle cx="268" cy="-86" r="31" fill="#c8ff2e" filter="url(#softGlow)"/>
    <circle cx="-251" cy="109" r="12" fill="#7ee7ff" opacity="0.82"/>

    <path d="M-152 -214 H-44 V214 H-152 Z" fill="#ffffff"/>
    <path d="M-82 -214 H82 C198 -214 270 -143 270 -35 C270 74 198 142 84 142 H-82 V36 H76 C128 36 160 9 160 -35 C160 -80 128 -108 76 -108 H-82 Z" fill="#ffffff"/>
    <rect x="174" y="122" width="78" height="78" rx="12" fill="#c8ff2e" filter="url(#softGlow)"/>
  </g>
